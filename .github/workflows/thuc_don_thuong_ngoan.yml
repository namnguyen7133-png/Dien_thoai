name: "Mắt Thần: Thực Đơn Thưởng Ngoạn 7 Ngày"

on:
  schedule:
    # Chạy hàng ngày vào lúc 00:00, 04:00, 08:00 UTC (tức 07:00, 11:00, 15:00 giờ VN)
    - cron: '0 0,4,8 * * *'
  workflow_dispatch:

jobs:
  kich_hoat:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Playwright
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Mo Link Thuc Don
        run: |
          python -c "
          import time
          from playwright.sync_api import sync_playwright
          
          # Link tệp HTML trên GitHub Pages của bạn
          url = 'https://namnguyen7133-png.github.io/Dien_thoai/032-thuc-on-nguoi-thuong-ngoan.html'
          
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              print(f'Dang mo: {url}')
              page.goto(url)
              # Đợi 20 giây để JavaScript trong HTML gửi tin nhắn Pushbullet
              time.sleep(20) 
              browser.close()
          "
