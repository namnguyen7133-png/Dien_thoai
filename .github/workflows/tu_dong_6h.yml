name: Quet Suc Khoe Tu Dong Xoay Vong
on:
  schedule:
    # Chạy mỗi 2 tiếng một lần (0h, 2h, 4h...)
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  suc_khoe:
    runs-on: ubuntu-latest
    steps:
      - name: Cai dat Playwright
        run: |
          pip install playwright
          playwright install chromium
      - name: Quet 1 file duy nhat (xoay vong theo ngay)
        run: |
          python -c "
          import time
          from datetime import datetime
          from playwright.sync_api import sync_playwright
          
          # Lấy ngày thứ bao nhiêu trong năm (1-366)
          day_of_year = datetime.now().timetuple().tm_yday
          # Chọn 1 file từ 1-300 dựa trên ngày hiện tại
          file_index = (day_of_year % 300) + 1
          url = f'https://namnguyen7133-png.github.io/Dien_thoai/file_{file_index}.html'
          
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              print(f'Ngay thu {day_of_year}: Quet file_{file_index}.html')
              try:
                  page.goto(url)
                  time.sleep(30)
              except:
                  print('Loi truy cap')
              browser.close()
          "
