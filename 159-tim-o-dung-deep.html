<!DOCTYPE html>
<html>
<head>
    <title>Tìm Đồ Vật & Trang Phục</title>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 20px; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            max-width: 1100px; 
            margin: 0 auto; 
        }
        h2 { 
            color: #2c3e50; 
            text-align: center; 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
            border-bottom: 2px solid #3498db; 
        }
        
        .stats-bar {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #1976d2;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.95em;
            padding: 5px 0;
        }
        .stat-value {
            font-weight: bold;
            color: #1976d2;
            font-size: 1.1em;
            background: white;
            padding: 2px 8px;
            border-radius: 12px;
            min-width: 40px;
            text-align: center;
        }
        
        .category-filter {
            margin-bottom: 20px;
        }
        .category-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .category-button {
            padding: 10px 20px;
            font-size: 14px;
            border: 2px solid #95a5a6;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: #2c3e50;
        }
        .category-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .category-button.active {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }
        
        .input-section { 
            margin-bottom: 25px; 
        }
        input[type="text"] { 
            width: 100%; 
            padding: 15px; 
            font-size: 18px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        input[type="text"]:focus { 
            border-color: #3498db; 
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        
        .mode-buttons { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .mode-button { 
            padding: 12px 24px; 
            font-size: 16px; 
            border: 2px solid #3498db; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s; 
            flex: 1;
            background: white;
            color: #3498db;
            font-weight: bold;
            min-width: 130px;
        }
        .mode-button:hover { 
            background: #f0f8ff;
            transform: translateY(-2px);
        }
        .mode-button.active { 
            background: #3498db; 
            color: white; 
            border-color: #2980b9;
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }
        
        .button-group { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px; 
            flex-wrap: wrap;
        }
        button { 
            padding: 14px 28px; 
            font-size: 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s; 
            flex: 1;
            min-width: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        #searchBtn { 
            background: linear-gradient(135deg, #2ecc71, #27ae60); 
            color: white; 
        }
        #searchBtn:hover { 
            background: linear-gradient(135deg, #27ae60, #219653);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }
        #nextBtn { 
            background: linear-gradient(135deg, #3498db, #2980b9); 
            color: white; 
        }
        #nextBtn:hover { 
            background: linear-gradient(135deg, #2980b9, #1c6ea4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        #nextBtn:disabled { 
            background: #bdc3c7; 
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .char-sequence-container {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }
        .char-sequence-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1em;
        }
        .char-sequence {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-start;
            align-items: center;
            max-width: 100%;
            overflow: visible;
        }
        .char-box { 
            width: 40px; 
            height: 40px; 
            background: #ecf0f1; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 1.2em;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            transition: all 0.3s;
            position: relative;
        }
        .char-box.active { 
            background: #3498db; 
            color: white; 
            border-color: #2980b9;
            transform: scale(1.05);
        }
        .char-box.found { 
            background: #2ecc71; 
            color: white; 
            border-color: #27ae60;
        }
        .char-box.not-found { 
            background: #e74c3c; 
            color: white; 
            border-color: #c0392b;
        }
        .char-index {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #2c3e50;
            color: white;
            font-size: 0.6em;
            padding: 1px 4px;
            border-radius: 8px;
            min-width: 16px;
            text-align: center;
        }
        
        .result-section { 
            margin-top: 20px; 
        }
        .result-box { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            min-height: 120px; 
            border: 2px solid #e0e0e0; 
            margin-top: 10px;
        }
        .status-info { 
            margin-top: 15px; 
            padding: 12px; 
            background: linear-gradient(135deg, #f8f9fa, #e9ecef); 
            border-radius: 10px; 
            color: #2c3e50;
            border-left: 4px solid #3498db;
            font-size: 0.9em;
        }
        
        .found-item { 
            background: linear-gradient(135deg, #ffffff, #f8f9fa); 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border-left: 4px solid #2ecc71; 
            display: flex; 
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .found-item.not-found {
            border-left-color: #e74c3c;
            background: linear-gradient(135deg, #fff5f5, #ffeaea);
        }
        .found-item .char-match { 
            background: #3498db; 
            color: white; 
            width: 35px; 
            height: 35px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 1.1em;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .found-item.not-found .char-match {
            background: #e74c3c;
        }
        .found-item .item-info { 
            flex: 1; 
        }
        .found-item .item-name { 
            font-weight: bold; 
            font-size: 1.1em; 
            color: #2c3e50;
            margin-bottom: 3px;
        }
        .found-item .item-details { 
            color: #7f8c8d; 
            font-size: 0.9em;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .item-room, .item-type {
            background: #ecf0f1;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85em;
        }
        
        .summary-box {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
            font-size: 0.9em;
        }
        
        .new-mode-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .new-mode-button {
            padding: 12px 20px;
            font-size: 14px;
            border: 2px solid #9b59b6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: #9b59b6;
            font-weight: bold;
            flex: 1;
            min-width: 180px;
        }
        .new-mode-button:hover {
            background: #f8f9ff;
            transform: translateY(-2px);
        }
        .new-mode-button.active {
            background: #9b59b6;
            color: white;
            border-color: #8e44ad;
            box-shadow: 0 4px 8px rgba(155, 89, 182, 0.3);
        }
        
        .combo-item {
            background: linear-gradient(135deg, #fffde7, #fff9c4);
            border-left: 4px solid #ffc107;
        }
        
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .char-box { width: 35px; height: 35px; font-size: 1em; }
            button { min-width: 100%; }
            .button-group, .mode-buttons, .new-mode-buttons { flex-direction: column; }
            .char-sequence { gap: 6px; }
            .mode-button, .category-button, .new-mode-button { min-width: 100%; }
            .stats-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">

                </button>
                <button class="category-button" data-category="clothing" onclick="setCategory('clothing')">
                    👔 Trang phục
                </button>
            </div>
        </div>
        
        <div class="input-section">
            <label for="charInput" style="display: block; margin-bottom: 10px; font-weight: bold; color: #2c3e50;">
                Nhập tên riêng:
            </label>
            <input type="text" id="charInput" placeholder="Nhập tên riêng..." value="">
            
            <div class="mode-buttons">
                <button class="mode-button active" data-mode="first" onclick="setMode('first')">
                    ĐẦU
                </button>
                <button class="mode-button" data-mode="middle" onclick="setMode('middle')">
                    GIỮA
                </button>
                <button class="mode-button" data-mode="last" onclick="setMode('last')">
                    CUỐI
                </button>
            </div>
            
            <div class="new-mode-buttons">
                <button class="new-mode-button" data-mode="combo" onclick="setMode('combo')">
                    🔄 TÌM TẤT CẢ CHỮ
                </button>
                <button class="new-mode-button" data-mode="allinone" onclick="setMode('allinone')">
                    🎯 TỔNG HỢP 1 TỪ
                </button>
            </div>
        </div>
        
        <div class="button-group">
            <button id="searchBtn" onclick="searchItems()">
                <span>🔎</span> Tìm Kiếm
            </button>
            <button id="nextBtn" onclick="nextSearch()" disabled>
                <span>⏭️</span> Tìm tiếp
            </button>
        </div>
        
        <div class="char-sequence-container" id="charSequenceContainer" style="display: none;">

        </div>
        
        <div class="result-section">

            </div>
            <div class="status-info" id="statusText" style="display: none;">

        function getItemKey(item, mode, charIndex = 0) {
            switch(mode) {
                case 'first': return item.key_first;
                case 'middle': return item.key_middle;
                case 'last': return item.key_last;
                case 'combo': 
                    // Trong combo mode, tìm tất cả các chữ cái trong từ
                    const word = item.name.toUpperCase().replace(/[^A-ZÀÁẢÃẠĂẰẮẲẴẶÂẦẤẨẪẬÈÉẺẼẸÊỀẾỂỄỆÌÍỈĨỊÒÓỎÕỌÔỒỐỔỖỘƠỜỚỞỠỢÙÚỦŨỤƯỪỨỬỮỰỲÝỶỸỴ]/g, '');
                    return word[charIndex % word.length] || '';
                default: return item.key_first;
            }
        }
        
        function getCharFromInput(inputChar, mode, index = 0) {
            const char = inputChar.toUpperCase();
            
            if (mode === 'middle') {
                const vowels = 'AEIOUYÀÁẢÃẠĂẰẮẲẴẶÂẦẤẨẪẬÈÉẺẼẸÊỀẾỂỄỆÌÍỈĨỊÒÓỎÕỌÔỒỐỔỖỘƠỜỚỞỠỢÙÚỦŨỤƯỪỨỬỮỰỲÝỶỸỴ';
                return vowels.includes(char) ? char : null;
            }
            
            return char;
        }

        // ==================== HÀM XỬ LÝ TÌM KIẾM ====================
        function searchItems() {
            const input = document.getElementById('charInput').value.trim();
            
            if (!input) {
                alert("Vui lòng nhập một tên riêng!");
                return;
            }
            
            // Xử lý các chế độ tìm kiếm khác nhau
            if (currentMode === 'combo') {
                searchComboMode(input);
            } else if (currentMode === 'allinone') {
                searchAllInOneMode(input);
            } else {
                searchNormalMode(input);
            }
        }
        
        function searchNormalMode(input) {
            const normalizedInput = input.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
            
            searchChars = [];
            for (let char of normalizedInput) {
                if (char !== ' ') {
                    const processedChar = getCharFromInput(char, currentMode);
                    if (processedChar) {
                        searchChars.push(processedChar);
                    }
                }
            }
            
            if (searchChars.length === 0) {
                alert("Không tìm thấy chữ cái phù hợp với chế độ đã chọn!");
                return;
            }
            
            displayCharSequence(searchChars);
            document.getElementById('charSequenceContainer').style.display = 'block';
            
            foundItems = [];
            usedItemIds.clear();
            
            // Lọc danh sách theo danh mục
            let filteredItems = allItems;
            if (currentCategory !== 'all') {
                filteredItems = allItems.filter(item => item.category === currentCategory);
            }
            
            for (let i = 0; i < searchChars.length; i++) {
                const char = searchChars[i];
                
                const matchedItems = filteredItems.filter(item => {
                    const itemKey = getItemKey(item, currentMode);
                    return itemKey === char && !usedItemIds.has(item.name + "_" + item.category);
                });
                
                if (matchedItems.length > 0) {
                    const randomIndex = Math.floor(Math.random() * matchedItems.length);
                    const selectedItem = { ...matchedItems[randomIndex] };
                    
                    selectedItem.matchedChar = char;
                    selectedItem.charIndex = i + 1;
                    selectedItem.isNotFound = false;
                    
                    foundItems.push(selectedItem);
                    usedItemIds.add(selectedItem.name + "_" + selectedItem.category);
                } else {
                    foundItems.push({
                        name: "Không tìm thấy",
                        key: char,
                        room: getRandomRoom(currentCategory),
                        type: "n/a",
                        matchedChar: char,
                        charIndex: i + 1,
                        isNotFound: true
                    });
                }
            }
            
            searchIndex = 0;
            displayNextPage();
            updateStatus();
            document.getElementById('nextBtn').disabled = (foundItems.length <= itemsPerPage);
            updateResultSummary();
        }
        
        function searchComboMode(input) {
            // Tìm tất cả chữ cái trong một từ (ví dụ: "nim" -> nồi, điện, cơm)
            const normalizedInput = input.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/\s+/g, '');
            
            searchChars = [];
            for (let char of normalizedInput) {
                if (char !== ' ') {
                    searchChars.push(char);
                }
            }
            
            if (searchChars.length === 0) {
                alert("Vui lòng nhập ít nhất một chữ cái!");
                return;
            }
            
            displayCharSequence(searchChars);
            document.getElementById('charSequenceContainer').style.display = 'block';
            
            foundItems = [];
            usedItemIds.clear();
            
            // Lọc danh sách theo danh mục
            let filteredItems = allItems;
            if (currentCategory !== 'all') {
                filteredItems = allItems.filter(item => item.category === currentCategory);
            }
            
            // Tìm các vật phẩm có chữ cái đầu trùng với từng chữ trong input
            for (let i = 0; i < searchChars.length; i++) {
                const char = searchChars[i];
                
                const matchedItems = filteredItems.filter(item => {
                    return item.key_first === char && !usedItemIds.has(item.name + "_" + item.category);
                });
                
                if (matchedItems.length > 0) {
                    const randomIndex = Math.floor(Math.random() * matchedItems.length);
                    const selectedItem = { ...matchedItems[randomIndex] };
                    
                    selectedItem.matchedChar = char;
                    selectedItem.charIndex = i + 1;
                    selectedItem.isNotFound = false;
                    
                    foundItems.push(selectedItem);
                    usedItemIds.add(selectedItem.name + "_" + selectedItem.category);
                } else {
                    foundItems.push({
                        name: "Không tìm thấy",
                        key: char,
                        room: getRandomRoom(currentCategory),
                        type: "n/a",
                        matchedChar: char,
                        charIndex: i + 1,
                        isNotFound: true
                    });
                }
            }
            
            searchIndex = 0;
            displayNextPage();
            updateStatus();
            document.getElementById('nextBtn').disabled = (foundItems.length <= itemsPerPage);
            updateResultSummary();
        }
        
        function searchAllInOneMode(input) {
            // Tìm tất cả chữ cái trong một từ và ghép thành cụm từ
            const normalizedInput = input.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/\s+/g, '');
            
            searchChars = [];
            for (let char of normalizedInput) {
                if (char !== ' ') {
                    searchChars.push(char);
                }
            }
            
            if (searchChars.length === 0) {
                alert("Vui lòng nhập ít nhất một chữ cái!");
                return;
            }
            
            displayCharSequence(searchChars);
            document.getElementById('charSequenceContainer').style.display = 'block';
            
            // Tìm các vật phẩm có chữ cái đầu trùng với từng chữ trong input
            let filteredItems = allItems;
            if (currentCategory !== 'all') {
                filteredItems = allItems.filter(item => item.category === currentCategory);
            }
            
            const allResults = [];
            usedItemIds.clear();
            
            // Tìm tất cả kết hợp có thể
            for (let i = 0; i < searchChars.length; i++) {
                const char = searchChars[i];
                
                const matchedItems = filteredItems.filter(item => {
                    return item.key_first === char && !usedItemIds.has(item.name + "_" + item.category);
                });
                
                if (matchedItems.length > 0) {
                    allResults.push({
                        char: char,
                        items: matchedItems,
                        index: i + 1
                    });
                } else {
                    allResults.push({
                        char: char,
                        items: [],
                        index: i + 1
                    });
                }
            }
            
            // Tạo các kết hợp
            comboModeResults = generateCombinations(allResults);
            
            if (comboModeResults.length === 0) {
                alert("Không thể tìm thấy kết hợp nào phù hợp!");
                return;
            }
            
            // Hiển thị kết quả đầu tiên
            searchIndex = 0;
            displayComboResult(0);
            updateStatus();
            document.getElementById('nextBtn').disabled = (comboModeResults.length <= 1);
            updateResultSummary();
        }
        
        function generateCombinations(allResults) {
            const combinations = [];
            
            function backtrack(index, currentCombo, usedItems) {
                if (index === allResults.length) {
                    combinations.push([...currentCombo]);
                    return;
                }
                
                const result = allResults[index];
                
                if (result.items.length === 0) {
                    // Không có vật phẩm nào cho chữ này
                    currentCombo.push({
                        char: result.char,
                        item: null,
                        index: result.index,
                        isNotFound: true
                    });
                    backtrack(index + 1, currentCombo, usedItems);
                    currentCombo.pop();
                } else {
                    // Thử từng vật phẩm cho chữ này
                    for (const item of result.items) {
                        const itemKey = item.name + "_" + item.category;
                        if (!usedItems.has(itemKey)) {
                            usedItems.add(itemKey);
                            currentCombo.push({
                                char: result.char,
                                item: item,
                                index: result.index,
                                isNotFound: false
                            });
                            backtrack(index + 1, currentCombo, usedItems);
                            currentCombo.pop();
                            usedItems.delete(itemKey);
                        }
                    }
                }
            }
            
            backtrack(0, [], new Set());
            return combinations;
        }

                    `;
                }
                
                itemsContainer.appendChild(itemElement);

            updateCharSequenceStatus();
        }
        
        function getRandomRoom(category) {
            const rooms = {
                'kitchen': 'Nhà bếp',
                'living': 'Phòng khách',

                'bathroom': 'Phòng tắm',

            return rooms[category] || 'Không xác định';

            itemsToShow.forEach(item => {
                const itemElement = document.createElement('div');
                itemElement.className = `found-item ${item.isNotFound ? 'not-found' : ''}`;
                
                if (item.isNotFound) {
                    itemElement.innerHTML = `
                        <div class="char-match">${item.matchedChar}</div>
                        <div class="item-info">
                            <div class="item-name">❌ ${item.name}</div>
                            <div class="item-details">
                                <span class="item-room">${item.room}</span>
                                <span class="item-type">${item.type}</span>
                            </div>
                        </div>
                        <div style="color: #e74c3c; font-weight: bold; font-size: 0.9em;">
                            #${item.charIndex}
                        </div>
                    `;
                } else {
                    itemElement.innerHTML = `
                        <div class="char-match">${item.matchedChar}</div>
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-details">
                                <span class="item-room">${item.room}</span>
                                <span class="item-type">${item.type}</span>
                            </div>
                        </div>
                        <div style="color: #3498db; font-weight: bold; font-size: 0.9em;">
                            #${item.charIndex}
                        </div>
                    `;
                }
                
                itemsContainer.appendChild(itemElement);
            });
            
            searchIndex += itemsPerPage;
            updateCharSequenceStatus();
            
            if (searchIndex >= foundItems.length && foundItems.length > 0) {
                const endMessage = document.createElement('div');
                endMessage.style.cssText = `
                    text-align: center; 
                    padding: 15px; 
                    color: #27ae60; 
                    background: #e8f5e9; 
                    border-radius: 8px; 
                    margin-top: 15px;
                    border: 1px solid #c8e6c9;
                    font-size: 0.9em;
                `;
                const foundCount = foundItems.filter(item => !item.isNotFound).length;
                const totalInDatabase = currentCategory === 'all' ? allItems.length : 
                    allItems.filter(item => item.category === currentCategory).length;
                endMessage.innerHTML = `
                    <div style="font-size: 1.1em; margin-bottom: 8px;">✅</div>
                    <strong>Hoàn tất!</strong><br>
                    <span>${foundCount}/${searchChars.length} chữ cái được tìm thấy</span><br>
                    <small>Từ ${totalInDatabase} mục trong danh mục ${getCategoryName(currentCategory)}</small>
                `;
                itemsContainer.appendChild(endMessage);
                document.getElementById('nextBtn').disabled = true;
            }
        }
        
        function getCategoryName(category) {
            switch(category) {
                case 'kitchen': return '🍳 Đồ bếp';
                case 'living': return '🛋️ Phòng khách';
                case 'bedroom': return '🛏️ Phòng ngủ';
                case 'bathroom': return '🚿 Phòng tắm';
                case 'clothing': return '👔 Trang phục';
                default: return 'Tất cả';
            }
        }
        
        function updateCharSequenceStatus() {
            const charBoxes = document.querySelectorAll('.char-box');
            const displayedCount = Math.min(searchIndex, foundItems.length);
            
            charBoxes.forEach((box, index) => {
                box.classList.remove('active', 'found', 'not-found');
                
                if (index < displayedCount) {
                    const item = foundItems[index];
                    if (item && item.isNotFound) {
                        box.classList.add('not-found');
                    } else if (item) {
                        box.classList.add('found');
                    }
                } else if (index === displayedCount && displayedCount < foundItems.length) {
                    box.classList.add('active');
                }
            });
        }
        
        function updateResultSummary() {
            let foundCount, totalCount;
            
            if (currentMode === 'allinone') {
                if (comboModeResults.length === 0) {
                    foundCount = 0;
                    totalCount = searchChars.length;
                } else {
                    const currentCombo = comboModeResults[searchIndex] || comboModeResults[0] || [];
                    foundCount = currentCombo.filter(item => !item.isNotFound).length;
                    totalCount = searchChars.length;
                }
            } else {
                foundCount = foundItems.filter(item => !item.isNotFound).length;
                totalCount = searchChars.length;
            }
            
            const percentage = totalCount > 0 ? Math.round((foundCount / totalCount) * 100) : 0;
            
            document.getElementById('resultSummary').innerHTML = `
                <span style="color: ${percentage >= 80 ? '#27ae60' : percentage >= 50 ? '#f39c12' : '#e74c3c'};">
                    ${foundCount}/${totalCount} chữ cái (${percentage}%)
                </span>
            `;
        }
        
        function nextSearch() {
            if (currentMode === 'allinone') {
                // Hiển thị kết hợp tiếp theo
                searchIndex = (searchIndex + 1) % comboModeResults.length;
                displayComboResult(searchIndex);
            } else {
                // Hiển thị trang tiếp theo
                displayNextPage();
                
                if (searchIndex >= foundItems.length) {
                    document.getElementById('nextBtn').disabled = true;
                }
            }
            
            updateStatus();
            updateResultSummary();
        }
        
        function updateStatus() {
            const statusText = document.getElementById('statusText');
            statusText.style.display = 'block';
            
            if (currentMode === 'allinone') {
                if (comboModeResults.length === 0) return;
                
                const currentCombo = comboModeResults[searchIndex] || comboModeResults[0] || [];
                const displayedCount = searchIndex + 1;
                const foundCount = currentCombo.filter(item => !item.isNotFound).length;
                
                let categoryText = '';
                switch(currentCategory) {
                    case 'all': categoryText = 'Tất cả'; break;
                    case 'kitchen': categoryText = '🍳 Đồ bếp'; break;
                    case 'living': categoryText = '🛋️ Phòng khách'; break;
                    case 'bedroom': categoryText = '🛏️ Phòng ngủ'; break;
                    case 'bathroom': categoryText = '🚿 Phòng tắm'; break;
                    case 'clothing': categoryText = '👔 Trang phục'; break;
                }
                
                statusText.innerHTML = `
                    Danh mục: <strong>${categoryText}</strong> | 
                    Chế độ: <strong>TỔNG HỢP 1 TỪ</strong><br>
                    Kết hợp: <strong>${displayedCount}/${comboModeResults.length}</strong> | 
                    Tìm thấy: <strong style="color: ${foundCount === searchChars.length ? '#27ae60' : '#f39c12'}">${foundCount}/${searchChars.length}</strong>
                `;
            } else {
                if (foundItems.length === 0) return;
                
                const displayedCount = Math.min(searchIndex, foundItems.length);
                const remainingCount = Math.max(foundItems.length - displayedCount, 0);
                const foundCount = foundItems.filter(item => !item.isNotFound).length;
                
                let categoryText = '';
                switch(currentCategory) {
                    case 'all': categoryText = 'Tất cả'; break;
                    case 'kitchen': categoryText = '🍳 Đồ bếp'; break;
                    case 'living': categoryText = '🛋️ Phòng khách'; break;
                    case 'bedroom': categoryText = '🛏️ Phòng ngủ'; break;
                    case 'bathroom': categoryText = '🚿 Phòng tắm'; break;
                    case 'clothing': categoryText = '👔 Trang phục'; break;
                }
                
                let modeText = '';
                switch(currentMode) {
                    case 'first': modeText = 'ĐẦU'; break;
                    case 'middle': modeText = 'GIỮA'; break;
                    case 'last': modeText = 'CUỐI'; break;
                    case 'combo': modeText = 'TẤT CẢ CHỮ'; break;
                }
                
                if (remainingCount > 0) {
                    statusText.innerHTML = `
                        Danh mục: <strong>${categoryText}</strong> | 
                        Chế độ: <strong>${modeText}</strong><br>
                        Hiển thị: <strong>${displayedCount}/${foundItems.length}</strong> | 
                        Tìm thấy: <strong style="color: ${foundCount === searchChars.length ? '#27ae60' : '#f39c12'}">${foundCount}/${searchChars.length}</strong>
                    `;
                } else {
                    statusText.innerHTML = `
                        <strong>Hoàn tất!</strong> Danh mục: ${categoryText} | Chế độ: ${modeText}<br>
                        Đã tìm thấy <strong style="color: #27ae60">${foundCount}/${searchChars.length}</strong> chữ cái
                    `;
                }
            }
        }
        
        // ==================== KHỞI TẠO ====================
        window.addEventListener('DOMContentLoaded', function() {
            setMode('first');
            setCategory('all');
            updateStatistics();
            document.getElementById('charInput').focus();
        });
        
        document.getElementById('charInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchItems();
            }
        });
        
        const examples = ['Nam', 'Anh', 'Linh', 'Minh', 'Huy', 'Long'];
        let exampleIndex = 0;
        
        document.getElementById('charInput').addEventListener('focus', function() {
            if (!this.value) {
                this.placeholder = "Ví dụ: " + examples[exampleIndex];
                exampleIndex = (exampleIndex + 1) % examples.length;
            }
        });
    </script>
