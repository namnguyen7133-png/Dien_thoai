        body {

            padding: 20px;
            background-color: #f5f5f5;
        }
        
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        label {
            font-weight: bold;
            color: #34495e;
        }
        
        input[type="date"] {
            padding: 10px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="date"]:focus {
            outline: none;
            border-color: #3498db;
        }
        
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        .result-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            background-color: #ecf0f1;
        }
        
        .result-item {
            margin: 15px 0;
            padding: 10px;
            background-color: white;
            border-left: 4px solid #3498db;
            border-radius: 3px;
        }
        
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .mung1 {
            border-left-color: #2ecc71;
        }
        
        .ram {
            border-left-color: #e74c3c;
        }
        
        .info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .year-info {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .year-item {
            padding: 5px 10px;
            background-color: #3498db;
            color: white;
            border-radius: 3px;
            font-size: 14px;
        }
        
        .error {
            color: #e74c3c;
            background-color: #fadbd8;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .special-calculation {
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        
        .special-calculation h4 {
            color: #856404;
            margin-top: 0;
        }
    </style>

        // Hàm tìm năm tra cứu dựa trên chu kỳ 19 năm
        function findReferenceYear(targetYear) {
            const baseYear = 2005;
            const cycle = 19;
            
            // Nếu năm mục tiêu nằm trong khoảng 2005-2025
            if (targetYear >= 2005 && targetYear <= 2025) {
                return targetYear.toString();
            }
            
            // Tính số dư khi chia cho 19
            const remainder = ((targetYear - baseYear) % cycle + cycle) % cycle;
            
            // Nếu năm lớn hơn 2025
            if (targetYear > 2025) {
                let refYear = baseYear + remainder;
                
                // Điều chỉnh để refYear ≤ 2025
                while (refYear > 2025) {
                    refYear -= cycle;
                }
                
                // Đảm bảo refYear ≥ 2005
                if (refYear < 2005) {
                    refYear += cycle;
                }
                
                return refYear.toString();
            }
            
            // Nếu năm nhỏ hơn 2005
            if (targetYear < 2005) {
                let refYear = baseYear - (cycle - remainder);
                
                // Điều chỉnh để refYear ≥ 2005
                while (refYear < 2005) {
                    refYear += cycle;
                }
                
                // Đảm bảo refYear ≤ 2025
                if (refYear > 2025) {
                    refYear -= cycle;
                }
                
                return refYear.toString();
            }
        }

        // Hàm chuyển đổi chuỗi ngày DD/MM/YYYY sang đối tượng Date
        function parseDate(dateStr) {
            const parts = dateStr.split('/');
            const day = parseInt(parts[0]);
            const month = parseInt(parts[1]) - 1;
            const year = parseInt(parts[2]);
            return new Date(year, month, day);
        }

        // Hàm định dạng ngày thành chuỗi DD/MM/YYYY
        function formatDate(date) {
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // Hàm tính số ngày chênh lệch
        function getDaysDiff(date1, date2) {
            const diffTime = Math.abs(date2.getTime() - date1.getTime());
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        // Hàm tính toán đặc biệt theo yêu cầu
        function calculateSpecialDate(targetDate, nearestLunarDate, eventName) {
            const daysDiff = getDaysDiff(targetDate, nearestLunarDate.date);
            const targetDay = targetDate.getDate();
            const lunarDay = nearestLunarDate.date.getDate();
            
            let calculationInfo = "";
            let calculatedDate = null;
            
            // Nếu số ngày chênh lệch lớn hơn 30, thực hiện tính toán đặc biệt
            if (daysDiff > 30) {
                const targetMonth = targetDate.getMonth() + 1; // Tháng hiện tại (1-12)
                const targetYear = targetDate.getFullYear();
                
                // Tính số ngày trong tháng hiện tại
                const daysInMonth = new Date(targetYear, targetMonth, 0).getDate();
                
                // Áp dụng công thức tính toán đặc biệt
                if (daysDiff <= daysInMonth) {
                    // Nếu số ngày chênh lệch ≤ số ngày trong tháng
                    calculatedDate = daysInMonth - daysDiff + 1;
                    
                    calculationInfo = `Tính toán đặc biệt: ${daysInMonth} (số ngày trong tháng ${targetMonth}) - ${daysDiff} (số ngày chênh lệch) + 1 = ${calculatedDate}`;
                } else {
                    // Nếu số ngày chênh lệch > số ngày trong tháng
                    // Lấy phần dư khi chia cho số ngày trong tháng
                    const remainder = daysDiff % daysInMonth;
                    calculatedDate = daysInMonth - remainder + 1;
                    
                    calculationInfo = `Tính toán đặc biệt: ${daysDiff} > ${daysInMonth} (số ngày trong tháng ${targetMonth}), lấy ${daysDiff} % ${daysInMonth} = ${remainder}, sau đó: ${daysInMonth} - ${remainder} + 1 = ${calculatedDate}`;
                }
                
                // Định dạng ngày tính toán
                const calculatedDateObj = new Date(targetYear, targetMonth - 1, calculatedDate);
                const formattedCalculatedDate = formatDate(calculatedDateObj);
                
                return {
                    originalDiff: daysDiff,
                    calculatedDiff: daysDiff,
                    calculationInfo: calculationInfo,
                    calculatedDate: formattedCalculatedDate,
                    daysInMonth: daysInMonth
                };
            } else {
                // Nếu số ngày chênh lệch ≤ 30, sử dụng tính toán bình thường
                calculationInfo = `Không cần tính toán đặc biệt vì số ngày chênh lệch (${daysDiff}) ≤ 30`;
                
                return {
                    originalDiff: daysDiff,
                    calculatedDiff: daysDiff,
                    calculationInfo: calculationInfo,
                    calculatedDate: nearestLunarDate.formattedDate,
                    daysInMonth: new Date(targetDate.getFullYear(), targetDate.getMonth() + 1, 0).getDate()
                };
            }
        }

        // Hàm tìm ngày rằm và mùng 1 gần nhất
        function findNearestLunarDates(targetDate) {
            const targetYear = targetDate.getFullYear();
            const refYear = findReferenceYear(targetYear);
            const yearDiff = targetYear - parseInt(refYear);
            
            if (!lunarData[refYear]) {
                return null;
            }
            
            // Tìm cả năm tham chiếu và năm trước/năm sau nếu cần
            const yearsToCheck = [];
            yearsToCheck.push(refYear);
            
            // Nếu năm tham chiếu là 2005 và targetYear < 2005, thêm năm 2024
            if (parseInt(refYear) === 2005 && targetYear < 2005) {
                yearsToCheck.push("2024");
            }
            // Nếu năm tham chiếu là 2025 và targetYear > 2025, thêm năm 2006
            else if (parseInt(refYear) === 2025 && targetYear > 2025) {
                yearsToCheck.push("2006");
            }
            
            let nearestMung1 = null;
            let nearestRam = null;
            let minMung1Diff = Infinity;
            let minRamDiff = Infinity;
            
            // Duyệt qua các năm cần kiểm tra
            yearsToCheck.forEach(yearKey => {
                const yearData = lunarData[yearKey];
                const currentYearDiff = targetYear - parseInt(yearKey);
                
                yearData.months.forEach(monthData => {
                    // Xử lý ngày mùng 1
                    const mung1Date = parseDate(monthData.mung1);
                    mung1Date.setFullYear(mung1Date.getFullYear() + currentYearDiff);
                    
                    const mung1Time = mung1Date.getTime();
                    const mung1Diff = mung1Time - targetDate.getTime();
                    
                    // Chỉ xét ngày trong tương lai (kể cả hôm nay)
                    if (mung1Diff >= 0 && mung1Diff < minMung1Diff) {
                        minMung1Diff = mung1Diff;
                        nearestMung1 = {
                            date: mung1Date,
                            lunarMonth: monthData.month,
                            formattedDate: formatDate(mung1Date),
                            originalDate: monthData.mung1
                        };
                    }
                    
                    // Xử lý ngày rằm
                    const ramDate = parseDate(monthData.ram);
                    ramDate.setFullYear(ramDate.getFullYear() + currentYearDiff);
                    
                    const ramTime = ramDate.getTime();
                    const ramDiff = ramTime - targetDate.getTime();
                    
                    // Chỉ xét ngày trong tương lai (kể cả hôm nay)
                    if (ramDiff >= 0 && ramDiff < minRamDiff) {
                        minRamDiff = ramDiff;
                        nearestRam = {
                            date: ramDate,
                            lunarMonth: monthData.month,
                            formattedDate: formatDate(ramDate),
                            originalDate: monthData.ram
                        };
                    }
                });
            });
            
            return {
                nearestMung1,
                nearestRam,
                referenceYear: refYear,
                checkedYears: yearsToCheck
            };
        }

            if (result.nearestMung1) {

                html += `

                    </div>
                `;
            } else {

            if (result.nearestRam) {
                const specialCalc = calculateSpecialDate(targetDate, result.nearestRam, "Rằm");

                    <div class="result-item ram">
                        <p><strong>🌕 Rằm (ngày 15) gần nhất:</strong></p>

                    </div>
                `;
            } else {
                html += `<div class="error">Không tìm thấy ngày rằm phù hợp</div>`;
            }
            
            // Xác định sự kiện nào gần hơn
            if (result.nearestMung1 && result.nearestRam) {
                const mung1Diff = result.nearestMung1.date.getTime() - targetDate.getTime();

            // Thêm thông tin về thuật toán

                <div class="info">

            `;
