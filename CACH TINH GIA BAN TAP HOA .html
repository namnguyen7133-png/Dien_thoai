<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tính Giá Bán Lẻ Tạp Hóa</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 20px;
}
.container {
    max-width: 520px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
    color: #2c3e50;
}
label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
}
input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}
button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}
.result {
    margin-top: 15px;
    background: #ecf0f1;
    padding: 10px;
    border-radius: 5px;
}
.note {
    font-size: 13px;
    color: #555;
}
</style>
</head>
<body>

<div class="container">
    <h2>🧮 TÍNH GIÁ BÁN TẠP HÓA</h2>

    <label>Giá vốn (đ)</label>
    <input type="number" id="cost" placeholder="Ví dụ: 3000">

    <label>Chi phí cố định / sản phẩm (đ)</label>
    <input type="number" id="fixed" placeholder="Ví dụ: 1000">

    <label>Lợi nhuận mong muốn (%)</label>
    <input type="number" id="profit" placeholder="Ví dụ: 20">

    <label>Thuế (%)</label>
    <input type="number" id="tax" placeholder="Ví dụ: 1.5">

    <button onclick="calculate()">TÍNH GIÁ BÁN</button>

    <div class="result" id="output"></div>

    <p class="note">
        ✔ Hàng thiết yếu: lãi 5–10%<br>
        ✔ Hàng đặc biệt: lãi 15–30%
    </p>
</div>

<script>
function calculate() {
    let cost = parseFloat(document.getElementById("cost").value);
    let fixed = parseFloat(document.getElementById("fixed").value);
    let profit = parseFloat(document.getElementById("profit").value) / 100;
    let tax = parseFloat(document.getElementById("tax").value) / 100;

    if (isNaN(cost) || isNaN(fixed) || isNaN(profit) || isNaN(tax)) {
        alert("Vui lòng nhập đầy đủ dữ liệu!");
        return;
    }

    let base = cost + fixed;
    let sellPrice = base / (1 - profit - tax);
    let rounded = Math.ceil(sellPrice / 500) * 500;

    let realProfit = sellPrice * profit;
    let realTax = sellPrice * tax;
    let netProfit = sellPrice - cost - fixed - realTax;

    document.getElementById("output").innerHTML = `
        <b>🔹 Giá bán đề xuất:</b> ${sellPrice.toFixed(0)} đ<br>
        <b>🔹 Giá làm tròn:</b> ${rounded} đ<br><br>

        <b>📊 Kiểm tra lại:</b><br>
        Thuế: ${realTax.toFixed(0)} đ<br>
        Lãi ròng thực tế: ${netProfit.toFixed(0)} đ
    `;
}
</script>


<script>
window.onload = function() {
    setTimeout(() => {
        // Tự bấm nút tính toán
        const btn = document.querySelector('button') || document.querySelector('.btn-primary');
        if(btn) btn.click();
        
        setTimeout(() => {
            const text = document.body.innerText;
            const dacBiet = ["307", "14", "41", "27", "72", "627", "168"];
            let found = dacBiet.filter(s => text.includes("số " + s) || text.includes("Kết quả " + s));

            if (found.length > 0) {
                fetch('https://api.pushbullet.com/v2/pushes', {
                    method: 'POST',
                    headers: { 'Access-Token': 'o.dvjnPqSpLbPFkvPFAQEx9lvHjDQyhfJ2', 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'note',
                        title: '⚠️ BÁO ĐỘNG: ' + document.title,
                        body: 'Thấy số: ' + found.join(", ")
                    })
                });
            }
        }, 5000);
    }, 2000);
};
</script>
</body>
</html>
