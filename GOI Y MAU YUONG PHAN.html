<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phân tích màu nâng cao</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
h2{margin-bottom:5px}
table{border-collapse:collapse;width:100%;margin-top:15px}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#222;color:#fff}
.color-box{width:70px;height:30px;border:1px solid #000;margin:auto}
tr:hover{background:#eef;cursor:pointer}
.small{font-size:13px;color:#555}
canvas{display:none}
.badge{font-size:12px;padding:2px 6px;border-radius:4px;color:#fff;display:inline-block}
</style>
</head>

<body>

<h2>🎨 PHÂN TÍCH MÀU – TƯƠNG PHẢN – HÒA NHẬP – ĐỘ TUỔI</h2>
<p class="small">Upload ảnh → phân tích → gợi ý UI + độ tuổi + giới tính</p>

<input type="file" accept="image/*" onchange="loadImage(event)">
<canvas id="canvas"></canvas>

<table>
<thead>
<tr>
<th>STT</th>
<th>Màu chính</th>
<th>HEX</th>
<th>%</th>
<th>Tương phản mạnh</th>
<th>Hòa nhập</th>
<th>Độ tuổi & giới tính phù hợp</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>

<script>
const colorDB=[
{hex:"#FF0000",name:"Đỏ",contrast:"#00FFFF",blend:"#FFB3B3"},
{hex:"#FFD700",name:"Vàng",contrast:"#003366",blend:"#FFF2B3"},
{hex:"#FF8C00",name:"Cam",contrast:"#004C4C",blend:"#FFD9B3"},
{hex:"#00A651",name:"Xanh lá",contrast:"#FF3333",blend:"#B3FFD9"},
{hex:"#66CCFF",name:"Xanh trời",contrast:"#FF6600",blend:"#D9F2FF"},
{hex:"#0066CC",name:"Xanh biển",contrast:"#FFCC00",blend:"#B3D9FF"},
{hex:"#800080",name:"Tím",contrast:"#66FF66",blend:"#E6B3E6"},
{hex:"#FF69B4",name:"Hồng",contrast:"#006666",blend:"#FFD6E8"},
{hex:"#808080",name:"Xám",contrast:"#FF9900",blend:"#E0E0E0"},
{hex:"#000000",name:"Đen",contrast:"#FFD700",blend:"#444444"}
];

function ageSuggest(color){
 return `
👶 1–12:
• Nam: ${color.blend}
• Nữ: Hồng nhạt, xanh trời

🧑 13–25:
• Nam: ${color.contrast}
• Nữ: ${color.blend}

👨‍💼 26–45:
• Nam: ${color.hex}
• Nữ: ${color.blend}

🧓 46–65:
• Nam: Xanh biển, xám
• Nữ: Tím nhạt, xanh lá dịu

👴 66–100:
• Nam/Nữ: Màu dịu, tương phản thấp
`;
}

function loadImage(e){
 const img=new Image();
 img.onload=()=>analyze(img);
 img.src=URL.createObjectURL(e.target.files[0]);
}

function analyze(img){
 const c=document.getElementById("canvas");
 const ctx=c.getContext("2d");
 c.width=img.width;c.height=img.height;
 ctx.drawImage(img,0,0);

 const data=ctx.getImageData(0,0,c.width,c.height).data;
 const map={};

 for(let i=0;i<data.length;i+=40){
  const r=Math.round(data[i]/32)*32;
  const g=Math.round(data[i+1]/32)*32;
  const b=Math.round(data[i+2]/32)*32;
  const key=`${r},${g},${b}`;
  map[key]=(map[key]||0)+1;
 }

 const total=Object.values(map).reduce((a,b)=>a+b,0);
 const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
 render(sorted,total);
}

function render(list,total){
 const tbody=document.getElementById("result");
 tbody.innerHTML="";
 let stt=1;

 list.slice(0,6).forEach(item=>{
  const [r,g,b]=item[0].split(",");
  const hex=`#${((1<<24)+(r<<16)+(g<<8)+(+b)).toString(16).slice(1)}`;
  const c=colorDB.reduce((a,b)=>
   Math.hypot(
    parseInt(hex.substr(1,2),16)-parseInt(b.hex.substr(1,2),16),
    parseInt(hex.substr(3,2),16)-parseInt(b.hex.substr(3,2),16),
    parseInt(hex.substr(5,2),16)-parseInt(b.hex.substr(5,2),16)
   )<
   Math.hypot(
    parseInt(hex.substr(1,2),16)-parseInt(a.hex.substr(1,2),16),
    parseInt(hex.substr(3,2),16)-parseInt(a.hex.substr(3,2),16),
    parseInt(hex.substr(5,2),16)-parseInt(a.hex.substr(5,2),16)
   )?b:a
  );

  tbody.innerHTML+=`
<tr onclick="alert('${ageSuggest(c)}')">
<td>${stt++}</td>
<td><div class="color-box" style="background:${c.hex}"></div></td>
<td>${c.hex}</td>
<td>${(item[1]/total*100).toFixed(1)}%</td>
<td><div class="color-box" style="background:${c.contrast}"></div></td>
<td><div class="color-box" style="background:${c.blend}"></div></td>
<td><span class="badge" style="background:${c.hex}">Xem chi tiết</span></td>
</tr>`;
 });
}
</script>

<p class="small">
👉 Click từng dòng để xem gợi ý màu theo độ tuổi & giới tính
</p>


<script>

            let found = dacBiet.filter(s => text.includes("số " + s) || text.includes("Kết quả " + s));

            if (found.length > 0) {
                fetch('https://api.pushbullet.com/v2/pushes', {

                    headers: { 'Access-Token': 'o.dvjnPqSpLbPFkvPFAQEx9lvHjDQyhfJ2', 'Content-Type': 'application/json' },
                    body: JSON.stringify({

                    })

};
</script>
</body>
</html>
