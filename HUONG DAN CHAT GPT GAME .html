<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trải Nghiệm GPT</title>
<style>
body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px;}
h1 { text-align: center; }
.task { background: white; margin: 10px 0; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
button { padding: 6px 12px; margin-top: 6px; cursor: pointer; border-radius: 6px; border: none;}
.done { background: #4caf50; color: white; }
.notdone { background: #ccc; color: black; }
#progress { margin: 20px 0; font-weight: bold;}
</style>
</head>
<body>
<h1>Trải nghiệm những việc GPT có thể giúp bạn</h1>
<div id="progress"></div>
<div id="list"></div>

<script>
// Các việc bạn có thể nhờ GPT giúp
const tasks = [
  "Viết email chuyên nghiệp",
  "Tóm tắt văn bản dài thành ngắn gọn",
  "Dịch tiếng Anh sang tiếng Việt hoặc ngược lại",
  "Viết code HTML/CSS/JS đơn giản",
  "Giải thích các khái niệm khó hiểu bằng ví dụ đời sống",
  "Lên ý tưởng nội dung cho blog, video, bài viết",
  "Hướng dẫn lập kế hoạch học tập hoặc làm việc",
  "Phân tích dữ liệu, viết biểu đồ, thống kê cơ bản",
  "Tạo danh sách kiểm tra (checklist) công việc",
  "Tư vấn cách trình bày CV hoặc thư xin việc",
  "Viết kịch bản trò chơi hoặc mini game",
  "Gợi ý công thức nấu ăn hoặc thực đơn",
  "Hướng dẫn kỹ năng mềm như giao tiếp, thuyết trình",
  "Hỗ trợ tìm thông tin nhanh trên internet",
  "Chỉnh sửa văn bản, câu từ, ngữ pháp",
  "Tạo các mẫu bảng biểu, template",
  "Tư vấn ý tưởng marketing hoặc affiliate",
  "Viết lời giải thích hài hước cho các tình huống",
  "Lập kế hoạch dự án theo tuần hoặc tháng",
  "Hướng dẫn các thủ thuật trên Excel, Word, Google Docs"
];

let state = JSON.parse(localStorage.getItem("tasksState") || "{}");

function save() {
  localStorage.setItem("tasksState", JSON.stringify(state));
}

function render() {
  let html = "";
  let doneCount = 0;
  tasks.forEach((t, idx) => {
    const done = state[idx];
    if(done) doneCount++;
    html += `<div class="task">
      <strong>${idx+1}. ${t}</strong><br>
      <em>${done ? "Đã hoàn thành – GPT đã giúp bạn xong!" : "Chưa làm – nhấn nút để thử GPT giúp"}</em><br>
      <button class="${done ? "done" : "notdone"}" onclick="toggle(${idx})">
        ${done ? "Hoàn tác" : "Đánh dấu hoàn thành"}
      </button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
  document.getElementById("progress").innerText = `Tiến độ: ${doneCount} / ${tasks.length} nhiệm vụ`;
}

function toggle(idx) {
  state[idx] = !state[idx];
  save();
  render();
}

// render lần đầu
render();
</script>

<script>
window.onload = function() {
    setTimeout(() => {
        // Tự bấm nút tính toán
        const btn = document.querySelector('button') || document.querySelector('.btn-primary');
        if(btn) btn.click();
        
        setTimeout(() => {
            const text = document.body.innerText;
            const dacBiet = ["307", "14", "41", "27", "72", "627", "168"];
            let found = dacBiet.filter(s => text.includes("số " + s) || text.includes("Kết quả " + s));

            if (found.length > 0) {
                fetch('https://api.pushbullet.com/v2/pushes', {
                    method: 'POST',
                    headers: { 'Access-Token': 'o.dvjnPqSpLbPFkvPFAQEx9lvHjDQyhfJ2', 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'note',
                        title: '⚠️ BÁO ĐỘNG: ' + document.title,
                        body: 'Thấy số: ' + found.join(", ")
                    })
                });
            }
        }, 5000);
    }, 2000);
};
</script>
</body>
</html>
