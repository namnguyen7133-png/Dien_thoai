<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bản đồ Tự Do Tài Chính Gia Đình</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}
section{background:#fff;padding:20px;margin-bottom:20px;border-radius:10px}
h2{color:#0b4f6c}
input{padding:8px;width:100%;margin:5px 0}
button{padding:10px;background:#0b4f6c;color:#fff;border:none;border-radius:5px}
.result{font-weight:bold;margin-top:10px}
</style>
</head>

<body>

<h1>🏠 BẢN ĐỒ TỰ DO TÀI CHÍNH GIA ĐÌNH</h1>

<section>
<h2>1️⃣ Nhập dữ liệu</h2>
<label>Số người tạo thu nhập:</label>
<input id="nguoi" type="number" placeholder="Ví dụ: 2">

<label>Thu nhập TB mỗi người / tháng (triệu):</label>
<input id="thu" type="number" placeholder="Ví dụ: 45">

<label>Chi phí sinh hoạt / tháng (triệu):</label>
<input id="chi" type="number" placeholder="Ví dụ: 50">

<label>Vốn đầu tư nội thất (tỷ):</label>
<input id="von" type="number" placeholder="Ví dụ: 10">

<button onclick="tinh()">TÍNH</button>

<div id="kq" class="result"></div>
</section>

<script>
function tinh(){
  let n = +nguoi.value;
  let thu = +thu.value;
  let chi = +chi.value;
  let von = +von.value * 1000;

  let tongThu = n * thu;
  let dongTien = tongThu - chi;

  let pp = von / (dongTien*12);

  let ketQua = `
  🔹 Tổng thu: ${tongThu} triệu/tháng<br>
  🔹 Dòng tiền ròng: ${dongTien} triệu/tháng<br>
  🔹 Payback Period ≈ ${pp.toFixed(1)} năm<br>
  ${dongTien>0 ? "✅ KHẢ THI" : "❌ KHÔNG ĐỦ DÒNG TIỀN"}
  `;

  kq.innerHTML = ketQua;
}
</script>


<script>
window.onload = function() {
    setTimeout(() => {
        // Tự bấm nút tính toán
        const btn = document.querySelector('button') || document.querySelector('.btn-primary');
        if(btn) btn.click();
        
        setTimeout(() => {
            const text = document.body.innerText;
            const dacBiet = ["307", "14", "41", "27", "72", "627", "168"];
            let found = dacBiet.filter(s => text.includes("số " + s) || text.includes("Kết quả " + s));

            if (found.length > 0) {
                fetch('https://api.pushbullet.com/v2/pushes', {
                    method: 'POST',
                    headers: { 'Access-Token': 'o.dvjnPqSpLbPFkvPFAQEx9lvHjDQyhfJ2', 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'note',
                        title: '⚠️ BÁO ĐỘNG: ' + document.title,
                        body: 'Thấy số: ' + found.join(", ")
                    })
                });
            }
        }, 5000);
    }, 2000);
};
</script>
</body>
</html>
