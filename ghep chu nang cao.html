<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò chơi Ghép Bảng Tùy Chỉnh</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .description {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .game-sections {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .section {
            flex: 1;
            min-width: 300px;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
        }
        
        .section h2 {
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.5rem;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, select, button, textarea {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        
        input, select, textarea {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        button {
            background: linear-gradient(to right, #ff8a00, #da1b60);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .result {
            text-align: center;
            font-size: 1.5rem;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 15px;
            transition: all 0.3s ease;
        }
        
        .highlight {
            color: #ffeb3b;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.7);
        }
        
        .tables-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .table-item {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .table-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .combinations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        
        .combination-item {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .combination-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .combination-number {
            font-size: 0.9rem;
            color: #ccc;
        }
        
        .combination-text {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .current-highlight {
            background: linear-gradient(135deg, #ff8a00, #da1b60);
            box-shadow: 0 0 15px rgba(255, 138, 0, 0.7);
        }
        
        .empty-state {
            text-align: center;
            color: #ccc;
            font-style: italic;
            padding: 20px;
        }
        
        @media (max-width: 768px) {
            .game-sections {
                flex-direction: column;
            }
            
            .combinations-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TRÒ CHƠI GHÉP BẢNG TÙY CHỈNH</h1>
        
        <div class="description">
            <p>Tạo các bảng với các ký tự tùy ý, sau đó chọn 2 bảng để ghép và tìm kết hợp theo số thứ tự!</p>
        </div>
        
        <div class="game-sections">
            <div class="section">
                <h2>Quản lý Bảng</h2>
                <div class="input-group">
                    <label for="tableName">Tên bảng:</label>
                    <input type="text" id="tableName" placeholder="Nhập tên bảng">
                </div>
                <div class="input-group">
                    <label for="tableItems">Các phần tử (phân cách bằng dấu phẩy):</label>
                    <textarea id="tableItems" rows="4" placeholder="Ví dụ: A,B,C,D,Đ,E,G,H,I,K,L,M"></textarea>
                </div>
                <button id="addTableBtn">Thêm Bảng</button>
                
                <div class="tables-list" id="tablesList">
                    <div class="empty-state">Chưa có bảng nào được thêm</div>
                </div>
            </div>
            
            <div class="section">
                <h2>Ghép Bảng</h2>
                <div class="input-group">
                    <label for="table1Select">Chọn Bảng 1:</label>
                    <select id="table1Select">
                        <option value="">-- Chọn bảng --</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="table2Select">Chọn Bảng 2:</label>
                    <select id="table2Select">
                        <option value="">-- Chọn bảng --</option>
                    </select>
                </div>
                <button id="generateBtn">Tạo Tổ Hợp</button>
            </div>
            
            <div class="section">
                <h2>Tìm Kiếm</h2>
                <div class="input-group">
                    <label for="searchNumber">Nhập số thứ tự:</label>
                    <input type="number" id="searchNumber" min="1" placeholder="Nhập số để tìm">
                </div>
                <button id="searchBtn">Tìm Kết Hợp</button>
                
                <div class="result" id="result">
                    Kết quả sẽ hiển thị ở đây
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>Tổ Hợp Được Tạo</h2>
            <div class="combinations-grid" id="combinationsGrid">
                <div class="empty-state">Chưa có tổ hợp nào được tạo</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Lưu trữ các bảng
            let tables = [];
            let currentCombinations = [];
            
            // Các phần tử DOM
            const tableNameInput = document.getElementById('tableName');
            const tableItemsInput = document.getElementById('tableItems');
            const addTableBtn = document.getElementById('addTableBtn');
            const tablesList = document.getElementById('tablesList');
            const table1Select = document.getElementById('table1Select');
            const table2Select = document.getElementById('table2Select');
            const generateBtn = document.getElementById('generateBtn');
            const searchNumberInput = document.getElementById('searchNumber');
            const searchBtn = document.getElementById('searchBtn');
            const resultDiv = document.getElementById('result');
            const combinationsGrid = document.getElementById('combinationsGrid');
            
            // Thêm bảng mới
            addTableBtn.addEventListener('click', function() {
                const name = tableNameInput.value.trim();
                const itemsText = tableItemsInput.value.trim();
                
                if (!name || !itemsText) {
                    alert('Vui lòng nhập đầy đủ tên và các phần tử của bảng!');
                    return;
                }
                
                const items = itemsText.split(',').map(item => item.trim()).filter(item => item);
                
                if (items.length === 0) {
                    alert('Vui lòng nhập ít nhất một phần tử!');
                    return;
                }
                
                const newTable = {
                    id: Date.now(), // Sử dụng timestamp để đảm bảo ID duy nhất
                    name: name,
                    items: items
                };
                
                tables.push(newTable);
                updateTablesList();
                updateTableSelects();
                
                // Reset input
                tableNameInput.value = '';
                tableItemsInput.value = '';
                
                alert(`Đã thêm bảng "${name}" với ${items.length} phần tử!`);
            });
            
            // Cập nhật danh sách bảng hiển thị
            function updateTablesList() {
                tablesList.innerHTML = '';
                
                if (tables.length === 0) {
                    tablesList.innerHTML = '<div class="empty-state">Chưa có bảng nào được thêm</div>';
                    return;
                }
                
                tables.forEach(table => {
                    const tableItem = document.createElement('div');
                    tableItem.className = 'table-item';
                    tableItem.innerHTML = `
                        <strong>${table.name}</strong> (${table.items.length} phần tử)
                        <div style="font-size: 0.9rem; margin-top: 5px;">${table.items.join(', ')}</div>
                    `;
                    tablesList.appendChild(tableItem);
                });
            }
            
            // Cập nhật dropdown chọn bảng
            function updateTableSelects() {
                // Lưu giá trị đang chọn
                const selectedTable1 = table1Select.value;
                const selectedTable2 = table2Select.value;
                
                // Xóa tất cả options trừ option đầu tiên
                while (table1Select.children.length > 1) {
                    table1Select.removeChild(table1Select.lastChild);
                }
                while (table2Select.children.length > 1) {
                    table2Select.removeChild(table2Select.lastChild);
                }
                
                // Thêm options mới
                tables.forEach(table => {
                    const option1 = document.createElement('option');
                    option1.value = table.id;
                    option1.textContent = table.name;
                    table1Select.appendChild(option1);
                    
                    const option2 = document.createElement('option');
                    option2.value = table.id;
                    option2.textContent = table.name;
                    table2Select.appendChild(option2);
                });
                
                // Khôi phục giá trị đã chọn nếu có
                if (selectedTable1 && tables.find(t => t.id == selectedTable1)) {
                    table1Select.value = selectedTable1;
                }
                if (selectedTable2 && tables.find(t => t.id == selectedTable2)) {
                    table2Select.value = selectedTable2;
                }
            }
            
            // Tạo tổ hợp từ 2 bảng
            generateBtn.addEventListener('click', function() {
                const table1Id = table1Select.value;
                const table2Id = table2Select.value;
                
                if (!table1Id || !table2Id) {
                    alert('Vui lòng chọn cả hai bảng!');
                    return;
                }
                
                if (table1Id === table2Id) {
                    alert('Vui lòng chọn hai bảng khác nhau!');
                    return;
                }
                
                const table1 = tables.find(t => t.id == table1Id);
                const table2 = tables.find(t => t.id == table2Id);
                
                if (!table1 || !table2) {
                    alert('Không tìm thấy bảng đã chọn!');
                    return;
                }
                
                // Tạo tổ hợp
                currentCombinations = [];
                let index = 1;
                
                for (let item1 of table1.items) {
                    for (let item2 of table2.items) {
                        currentCombinations.push({
                            number: index,
                            item1: item1,
                            item2: item2,
                            table1: table1.name,
                            table2: table2.name
                        });
                        index++;
                    }
                }
                
                displayCombinations();
                resultDiv.innerHTML = `Đã tạo ${currentCombinations.length} tổ hợp từ "${table1.name}" và "${table2.name}"`;
            });
            
            // Hiển thị tổ hợp
            function displayCombinations() {
                combinationsGrid.innerHTML = '';
                
                if (currentCombinations.length === 0) {
                    combinationsGrid.innerHTML = '<div class="empty-state">Chưa có tổ hợp nào được tạo</div>';
                    return;
                }
                
                currentCombinations.forEach(combo => {
                    const comboItem = document.createElement('div');
                    comboItem.className = 'combination-item';
                    comboItem.id = `combo-${combo.number}`;
                    
                    const comboNumber = document.createElement('div');
                    comboNumber.className = 'combination-number';
                    comboNumber.textContent = `#${combo.number}`;
                    
                    const comboText = document.createElement('div');
                    comboText.className = 'combination-text';
                    comboText.textContent = `${combo.item1} - ${combo.item2}`;
                    
                    comboItem.appendChild(comboNumber);
                    comboItem.appendChild(comboText);
                    combinationsGrid.appendChild(comboItem);
                });
            }
            
            // Tìm kiếm tổ hợp theo số
            searchBtn.addEventListener('click', function() {
                const number = parseInt(searchNumberInput.value);
                
                if (isNaN(number) || number < 1) {
                    resultDiv.innerHTML = `<span class="highlight">Vui lòng nhập số hợp lệ</span>`;
                    return;
                }
                
                if (currentCombinations.length === 0) {
                    resultDiv.innerHTML = `<span class="highlight">Chưa có tổ hợp nào được tạo</span>`;
                    return;
                }
                
                if (number > currentCombinations.length) {
                    resultDiv.innerHTML = `<span class="highlight">Vui lòng nhập số từ 1 đến ${currentCombinations.length}</span>`;
                    return;
                }
                
                const combination = currentCombinations[number - 1];
                
                // Xóa highlight cũ
                document.querySelectorAll('.combination-item').forEach(item => {
                    item.classList.remove('current-highlight');
                });
                
                // Thêm highlight mới
                const currentCombo = document.getElementById(`combo-${number}`);
                if (currentCombo) {
                    currentCombo.classList.add('current-highlight');
                    currentCombo.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                // Hiển thị kết quả
                resultDiv.innerHTML = `Số ${number}: <span class="highlight">${combination.item1}</span> (${combination.table1}) - <span class="highlight">${combination.item2}</span> (${combination.table2})`;
            });
            
            // Cho phép nhấn Enter để thêm bảng
            tableNameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addTableBtn.click();
                }
            });
            
            tableItemsInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    addTableBtn.click();
                }
            });
            
            // Cho phép nhấn Enter để tìm kiếm
            searchNumberInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchBtn.click();
                }
            });
        });
    </script>

<script>

    setTimeout(() => {
        // Tự bấm nút tính toán
        const btn = document.querySelector('button') || document.querySelector('.btn-primary');
        if(btn) btn.click();

</script>
</body>
</html>
