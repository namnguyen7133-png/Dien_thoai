<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Điều Hành - NGUYÊN MINH NAM</title>
</head>
<body>
    <div id="output">Nhấn <b>Ctrl + Shift + S</b> để thực hiện kiểm tra.</div>

<script>
    const SO_NGUY_HIEM = ["307", "14", "41", "27", "72", "627", "168", "303"];
    const TOKEN = "o.dvjnPqSpLbPFkvPFAQEx9lvHjDQyhfJ2"; 
    const BIRTH = "19710303";

    async function checkMultiDays() {
        document.getElementById('output').innerText = "Đang kiểm tra...";
        let reports = [];

        for (let i = -1; i <= 3; i++) {
            let d = new Date();
            d.setDate(d.getDate() + i);
            let dString = d.toLocaleDateString('vi-VN');
            let seed = d.toISOString().split('T')[0].replaceAll('-', '') + BIRTH;
            
            let num = ((parseInt(seed.slice(-5)) * 7) % 900 + 100).toString();
            let hh = (parseInt(num) % 24).toString().padStart(2, '0');
            let mm = (parseInt(num) % 60).toString().padStart(2, '0');

            let status = SO_NGUY_HIEM.includes(num) ? "⚠️ NGUY HIỂM" : "Bình thường";
            reports.push(`${dString} | Số: ${num} | Giờ: ${hh}:${mm} -> ${status}`);
        }

        const finalMsg = reports.join('\n');
        document.getElementById('output').innerText = finalMsg;

        await fetch('https://api.pushbullet.com/v2/pushes', {
            method: 'POST',
            headers: { 'Access-Token': TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                type: 'note',
                title: 'BÁO CÁO CHỈ SỐ: NGUYÊN MINH NAM',
                body: finalMsg
            })
        }).catch(err => console.error("Lỗi gửi Pushbullet:", err));
    }

    // Lắng nghe sự kiện bàn phím
    document.addEventListener('keydown', function(event) {
        // Kiểm tra phím tắt Ctrl + Shift + S
        if (event.ctrlKey && event.shiftKey && event.key === 'S') {
            event.preventDefault(); // Chặn hành động mặc định của trình duyệt
            checkMultiDays();
        }
    });
</script>
</body>
</html>
